services:
  mysql:
    image: mysql:8.0
    container_name: rifa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: RifaP@ssw0rd2024!
      MYSQL_DATABASE: rifa_manager
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRifaP@ssw0rd2024!"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rifa-manager:
    build: .
    container_name: rifa-manager
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=mysql://root:RifaP@ssw0rd2024!@mysql:3306/rifa_manager
      - JWT_SECRET=r1f4-s3cr3t-k3y-ch4ng3-m3
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:
